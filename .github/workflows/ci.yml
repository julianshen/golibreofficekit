name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: lint + unit tests (Go ${{ matrix.go }})
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - go: "1.23"
            required: true
          - go: "stable"
            required: false
    continue-on-error: ${{ !matrix.required }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure cc is available
        run: |
          if ! command -v cc >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends build-essential
          fi
          cc --version | head -n 1

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
          cache: true

      - name: Show Go version
        run: go version

      - name: Lint (vet + gofmt check)
        run: make lint

      - name: Coverage gate (runs tests with -race)
        run: make cover-gate
