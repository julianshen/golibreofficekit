name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: lint + unit tests (Go ${{ matrix.go }})
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - go: "1.23"
            required: true
          - go: "stable"
            required: false
    continue-on-error: ${{ !matrix.required }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure cc is available
        run: |
          if ! command -v cc >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends build-essential
          fi
          cc --version | head -n 1

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
          cache: true

      - name: Show Go version
        run: go version

      - name: Lint (vet + gofmt check)
        run: make lint

      - name: Coverage gate (runs tests with -race)
        run: make cover-gate

  integration:
    name: integration smoke (LOK_PATH)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # Marked non-blocking until we observe a few green runs in a row;
    # promote to required once it is stable. The point is to surface
    # issues like Phase 10's payload-shape drift early, not to gate
    # green PRs on apt-get and LO startup quirks.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install LibreOffice + build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libreoffice \
            libreoffice-core \
            libreofficekit-data
          test -d /usr/lib/libreoffice/program

      - name: Set up Go 1.23
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          check-latest: true
          cache: true

      - name: Show versions
        run: |
          go version
          /usr/lib/libreoffice/program/soffice --version || true

      - name: Run integration smoke
        env:
          # GODEBUG=asyncpreemptoff=1 is set by the Makefile target;
          # LOK_PATH selects the LO program/ directory the integration
          # tests dlopen.
          LOK_PATH: /usr/lib/libreoffice/program
        run: make test-integration
